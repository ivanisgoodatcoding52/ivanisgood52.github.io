<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObscureYT</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #ccc;
    color: #333;
    text-align: center;
}

h1 {
    font-size: 24px;
    font-weight: bold;
    background-color: #eee;
    padding: 10px;
    border-bottom: 2px solid #aaa;
}

iframe {
    width: 640px;
    height: 360px;
    border: 3px solid #999;
    background-color: black;
    margin-top: 20px;
}

button {
    background-color: #d6d6d6;
    border: 1px solid #888;
    padding: 8px 15px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background-color: #c2c2c2;
}

select, input {
    padding: 5px;
    font-size: 14px;
    margin-top: 10px;
}

input {
    width: 300px;
    border: 1px solid #888;
}
</style>
</head>

<body>

<h1>ObscureYT</h1>
<h4>A PetitTube Inspired Page</h4>

<br>

<input type="text" id="searchInput" placeholder="Enter search terms...">

<br>

<select id="platformSelect">
    <option value="youtube">YouTube</option>
    <option value="dailymotion">Dailymotion</option>
    <option value="vimeo">Vimeo</option>
</select>

<br>

<button onclick="loadVideo()">Search / Load Video</button>

<br>

<iframe id="videoFrame" allowfullscreen></iframe>

<script>

/* =========================
   CONFIG
========================= */

const YT_KEYS = [
    "AIzaSyCIRHDP5IxjlL3q2r9LXp3_7TFJPY6NumY",
    "AIzaSyCxoYR72WIhJwZXAxPC7OTKHAWv05VWj40",
    "AIzaSyD3d9FIrzCnrtPh8OVV5yaAnLnoIOUzjFY",
    "AIzaSyAz_rSdU2nxA6EzFfPDHAWglPjPWfQpn5A"
];

let ytKeyIndex = 0;

const VIMEO_TOKEN = "7681d0235110de72643cd3743ac49fe5"; // Leave blank if not using Vimeo


/* =========================
   MAIN FUNCTION
========================= */

async function loadVideo() {
    const platform = document.getElementById("platformSelect").value;
    const frame = document.getElementById("videoFrame");
    const searchValue = document.getElementById("searchInput").value.trim();

    const query = searchValue !== "" ? searchValue : getRandomWord();

    try {
        if (platform === "youtube") {
            await loadYouTube(frame, query);
        } 
        else if (platform === "dailymotion") {
            await loadDailymotion(frame, query);
        } 
        else if (platform === "vimeo") {
            await loadVimeo(frame, query);
        }
    } catch (err) {
        console.error(err);
        alert("Failed to load video.");
    }
}


/* =========================
   YOUTUBE
========================= */

async function loadYouTube(frame, query) {

    const response = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${encodeURIComponent(query)}&maxResults=25&key=${YT_KEYS[ytKeyIndex]}`
    );

    if (response.status === 403) {
        ytKeyIndex = (ytKeyIndex + 1) % YT_KEYS.length;
        return loadYouTube(frame, query);
    }

    if (!response.ok) {
        throw new Error("YouTube request failed.");
    }

    const data = await response.json();

    if (!data.items || data.items.length === 0) {
        throw new Error("No YouTube results.");
    }

    const randomVideo =
        data.items[Math.floor(Math.random() * data.items.length)];

    frame.src = `https://www.youtube.com/embed/${randomVideo.id.videoId}`;
}


/* =========================
   DAILYMOTION
========================= */

async function loadDailymotion(frame, query) {

    const response = await fetch(
        `https://api.dailymotion.com/videos?search=${encodeURIComponent(query)}&limit=50`
    );

    if (!response.ok) {
        throw new Error("Dailymotion request failed.");
    }

    const data = await response.json();

    if (!data.list || data.list.length === 0) {
        throw new Error("No Dailymotion results.");
    }

    const randomVideo =
        data.list[Math.floor(Math.random() * data.list.length)];

    frame.src = `https://www.dailymotion.com/embed/video/${randomVideo.id}`;
}


/* =========================
   VIMEO
========================= */

async function loadVimeo(frame, query) {

    if (!VIMEO_TOKEN) {
        throw new Error("Add your Vimeo token to use Vimeo.");
    }

    const response = await fetch(
        `https://api.vimeo.com/videos?query=${encodeURIComponent(query)}&per_page=25`,
        {
            headers: {
                Authorization: `Bearer ${VIMEO_TOKEN}`
            }
        }
    );

    if (!response.ok) {
        throw new Error("Vimeo request failed.");
    }

    const data = await response.json();

    if (!data.data || data.data.length === 0) {
        throw new Error("No Vimeo results.");
    }

    const randomVideo =
        data.data[Math.floor(Math.random() * data.data.length)];

    const videoId = randomVideo.uri.split("/").pop();

    frame.src = `https://player.vimeo.com/video/${videoId}`;
}


/* =========================
   RANDOM WORD FALLBACK
========================= */

function getRandomWord() {
    const words = [
        "hello",
        "random",
        "music",
        "gaming",
        "vlog",
        "funny",
        "2008",
        "tutorial",
        "test",
        "old"
    ];

    return words[Math.floor(Math.random() * words.length)];
}

</script>

</body>
</html>
