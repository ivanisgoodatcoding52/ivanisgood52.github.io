<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObscureYT</title>

<style>
    :root {
        --bg: #0d0f12;
        --panel: #14171c;
        --panel-border: #262b33;
        --text: #d7dde3;
        --text-dim: #7b8794;
        --accent: #39ff88;
        --accent-dim: #1f8f52;
        --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        background: var(--bg);
        background-image:
            radial-gradient(circle at 20% 0%, rgba(57, 255, 136, 0.06), transparent 40%),
            radial-gradient(circle at 80% 100%, rgba(57, 255, 136, 0.05), transparent 40%);
        color: var(--text);
        min-height: 100vh;
        margin: 0;
        padding: 40px 16px;
        display: flex;
        justify-content: center;
    }

    .app {
        width: 100%;
        max-width: 520px;
    }

    .titlebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-bottom: none;
        border-radius: 10px 10px 0 0;
    }

    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3a3f47;
    }

    .titlebar-label {
        margin-left: 6px;
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
    }

    h1 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.06em;
        margin: 0;
        padding: 16px 20px 4px;
        color: var(--accent);
    }

    h1::before {
        content: "> ";
        color: var(--accent-dim);
    }

    .subtitle {
        margin: 0;
        padding: 0 20px 16px;
        font-size: 12px;
        color: var(--text-dim);
    }

    .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-top: none;
        border-radius: 0 0 10px 10px;
        padding: 20px;
    }

    .field {
        margin-bottom: 16px;
    }

    .field label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        margin-bottom: 6px;
    }

    .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
        width: 100%;
        background: #0b0d10;
        color: var(--text);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        padding: 9px 10px;
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    select:focus {
        border-color: var(--accent-dim);
    }

    .checks {
        display: flex;
        gap: 20px;
        margin-bottom: 18px;
    }

    .check {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-dim);
        cursor: pointer;
    }

    .check input {
        accent-color: var(--accent);
        cursor: pointer;
    }

    button {
        width: 100%;
        background: var(--accent);
        color: #04150a;
        border: none;
        border-radius: 6px;
        padding: 12px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.05s ease;
    }

    button:hover { background: #4dffa0; }
    button:active { transform: scale(0.99); }

    .screen {
        margin-top: 18px;
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 10px;
        background: #000;
        box-shadow: 0 0 0 1px rgba(57, 255, 136, 0.08), 0 0 24px rgba(57, 255, 136, 0.05);
    }

    iframe {
        width: 100%;
        aspect-ratio: 16 / 9;
        height: auto;
        border: none;
        border-radius: 4px;
        display: block;
        background: black;
    }
</style>
</head>

<body>

<div class="app">

    <div class="titlebar">
        <div class="dot" style="background:#ff6058;"></div>
        <div class="dot" style="background:#ffbd2e;"></div>
        <div class="dot" style="background:#27c93f;"></div>
        <span class="titlebar-label">obscure_yt.sh</span>
    </div>

    <h1>ObscureYT</h1>
    <p class="subtitle">dig up YouTube videos almost nobody has watched</p>

    <div class="panel">

        <div class="field">
            <label for="searchInput">Search terms</label>
            <input type="text" id="searchInput" placeholder="e.g. vlog, tutorial, 2009...">
        </div>

        <div class="row">
            <div class="field">
                <label for="beforeDate">Published before</label>
                <input type="date" id="beforeDate">
            </div>

            <div class="field">
                <label for="viewLimit">Max views</label>
                <input type="number" id="viewLimit" min="0" step="100" value="5000" placeholder="5000">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label for="sortMode">Sort mode</label>
                <select id="sortMode">
                    <option value="date">Newest first</option>
                    <option value="viewCount">Lowest views first</option>
                    <option value="relevance">Relevance</option>
                </select>
            </div>

            <div class="field" style="display:flex; align-items:flex-end;">
                <div class="checks" style="margin-bottom:9px;">
                    <label class="check">
                        <input type="checkbox" id="randomYearMode">
                        Random year
                    </label>
                    <label class="check">
                        <input type="checkbox" id="autoPlayToggle">
                        Autoplay
                    </label>
                </div>
            </div>
        </div>

        <button onclick="loadVideo()">Search / Load Video</button>

        <div class="screen">
            <iframe id="videoFrame" allowfullscreen></iframe>
        </div>

    </div>
</div>

<script>

/* =====================================================================
   CONFIG
   ===================================================================== */

const YT_KEYS = [
    "AIzaSyAz_rSdU2nxA6EzFfPDHAWglPjPWfQpn5A",
    "AIzaSyD3d9FIrzCnrtPh8OVV5yaAnLnoIOUzjFY",
    "AIzaSyCxoYR72WIhJwZXAxPC7OTKHAWv05VWj40",
    "AIzaSyCIRHDP5IxjlL3q2r9LXp3_7TFJPY6NumY",
    "AIzaSyDokI4VAgm_s5jxMrPsFG4d9u6GfTWmeT4"
];

const RANDOM_WORDS = [
    "hello", "random", "music", "gaming", "vlog",
    "funny", "2008", "tutorial", "old", "test"
];

const DEFAULT_VIEW_LIMIT = 5000;
const MAX_SEARCH_PAGES = 3;   // how many pages of 50 search results to pull
const STATS_CHUNK_SIZE = 50;  // YouTube "videos" endpoint id limit

/* =====================================================================
   STATE
   ===================================================================== */

let ytKeyIndex = 0;
let isLoading = false;

// Videos already shown to the user for the CURRENT search settings.
let playedVideos = new Set();

// Remaining candidate videos for the CURRENT search settings.
let youtubePool = [];

// Fingerprint of the settings that produced `youtubePool`, so we know
// when to throw the cache away and fetch fresh results.
let lastSearchSignature = null;

/* =====================================================================
   SETTINGS HELPERS
   ===================================================================== */

function readSettings() {
    const rawViewLimit = parseInt(document.getElementById("viewLimit").value);
    const viewLimit = Number.isFinite(rawViewLimit) && rawViewLimit > 0
        ? rawViewLimit
        : DEFAULT_VIEW_LIMIT;

    return {
        searchValue: document.getElementById("searchInput").value.trim(),
        beforeDateInput: document.getElementById("beforeDate").value,
        viewLimit,
        sortMode: document.getElementById("sortMode").value,
        randomYearMode: document.getElementById("randomYearMode").checked
    };
}

function resolvePublishedBefore(settings) {
    if (settings.randomYearMode) {
        const randomYear = Math.floor(Math.random() * (2022 - 2005)) + 2005;
        return new Date(randomYear, 11, 31).toISOString();
    }
    if (settings.beforeDateInput) {
        return new Date(settings.beforeDateInput).toISOString();
    }
    return "";
}

function getRandomWord() {
    return RANDOM_WORDS[Math.floor(Math.random() * RANDOM_WORDS.length)];
}

// A signature that changes whenever the user changes any setting that
// should invalidate the cached results pool. "Random Year" mode always
// gets a fresh signature since it's meant to reroll every time.
function buildSearchSignature(query, settings, publishedBefore) {
    if (settings.randomYearMode) {
        return `random:${Date.now()}:${Math.random()}`;
    }
    return JSON.stringify({
        query,
        publishedBefore,
        viewLimit: settings.viewLimit,
        sortMode: settings.sortMode
    });
}

/* =====================================================================
   YOUTUBE API
   ===================================================================== */

async function fetchSearchResults(query, publishedBefore) {
    let collected = [];
    let pageToken = null;

    for (let i = 0; i < MAX_SEARCH_PAGES; i++) {
        let url =
            `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video` +
            `&q=${encodeURIComponent(query)}&maxResults=50` +
            `&order=${document.getElementById("sortMode").value}` +
            `&key=${YT_KEYS[ytKeyIndex]}`;

        if (publishedBefore) url += `&publishedBefore=${publishedBefore}`;
        if (pageToken) url += `&pageToken=${pageToken}`;

        const response = await fetch(url);

        if (response.status === 403) {
            ytKeyIndex = (ytKeyIndex + 1) % YT_KEYS.length;
            return { rotateKey: true };
        }
        if (!response.ok) {
            throw new Error("YouTube search failed.");
        }

        const data = await response.json();
        if (!data.items) break;

        collected.push(...data.items);
        pageToken = data.nextPageToken;
        if (!pageToken) break;
    }

    return { rotateKey: false, items: collected };
}

async function fetchStatistics(videoIds) {
    let allStats = [];

    for (let i = 0; i < videoIds.length; i += STATS_CHUNK_SIZE) {
        const chunk = videoIds.slice(i, i + STATS_CHUNK_SIZE);

        const statsResponse = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${chunk.join(",")}&key=${YT_KEYS[ytKeyIndex]}`
        );

        if (statsResponse.status === 403) {
            ytKeyIndex = (ytKeyIndex + 1) % YT_KEYS.length;
            return { rotateKey: true };
        }
        if (!statsResponse.ok) {
            throw new Error("Stats request failed.");
        }

        const statsData = await statsResponse.json();
        allStats.push(...statsData.items);
    }

    return { rotateKey: false, items: allStats };
}

/* =====================================================================
   POOL MANAGEMENT
   ===================================================================== */

// Builds a fresh, shuffled pool of "obscure" videos (under the view
// limit) for the given query/settings. Returns [] if nothing matched.
async function buildObscurePool(query, publishedBefore, viewLimit) {
    const searchResult = await fetchSearchResults(query, publishedBefore);
    if (searchResult.rotateKey) return { rotateKey: true };

    const uniqueIds = [...new Set(searchResult.items.map(v => v.id.videoId))];
    if (uniqueIds.length === 0) return { rotateKey: false, pool: [] };

    const statsResult = await fetchStatistics(uniqueIds);
    if (statsResult.rotateKey) return { rotateKey: true };

    const obscure = statsResult.items.filter(video =>
        parseInt(video.statistics.viewCount) <= viewLimit
    );

    // Shuffle so repeated draws from the same pool don't always come
    // out in the same order.
    const shuffled = obscure.sort(() => 0.5 - Math.random());

    return { rotateKey: false, pool: shuffled };
}

/* =====================================================================
   MAIN
   ===================================================================== */

async function loadVideo() {
    const frame = document.getElementById("videoFrame");
    const settings = readSettings();
    const query = settings.searchValue !== "" ? settings.searchValue : getRandomWord();

    await loadYouTube(frame, query, settings);
}

async function loadYouTube(frame, query, settings) {
    if (isLoading) return;
    isLoading = true;

    try {
        const publishedBefore = resolvePublishedBefore(settings);
        const signature = buildSearchSignature(query, settings, publishedBefore);

        // Settings changed since the last search (or this is the first
        // search) -> throw away the old cached pool and start clean.
        if (signature !== lastSearchSignature) {
            youtubePool = [];
            playedVideos = new Set();
            lastSearchSignature = signature;
        }

        // Refill the pool if it's empty.
        if (youtubePool.length === 0) {
            const result = await buildObscurePool(query, publishedBefore, settings.viewLimit);

            if (result.rotateKey) {
                isLoading = false;
                return loadYouTube(frame, query, settings);
            }

            if (result.pool.length === 0) {
                isLoading = false;
                alert("No obscure videos found for these settings. Try a different search, date, or view limit.");
                return;
            }

            youtubePool = result.pool;
        }

        // Remove anything we've already shown for this exact search.
        youtubePool = youtubePool.filter(v => !playedVideos.has(v.id));

        if (youtubePool.length === 0) {
            // We've shown every obscure video that matches these exact
            // settings. Rather than silently looping back and replaying
            // the same handful of videos, let the user know and stop -
            // they can tweak the search for fresh results.
            isLoading = false;
            alert("You've seen every obscure video matching this search. Try changing the search terms, date, or view limit for more.");
            return;
        }

        const nextVideo = youtubePool.pop();
        playedVideos.add(nextVideo.id);

        frame.src = `https://www.youtube.com/embed/${nextVideo.id}?autoplay=1`;
    } finally {
        isLoading = false;
    }
}

/* =====================================================================
   AUTOPLAY
   ===================================================================== */

document.getElementById("videoFrame").addEventListener("load", () => {
    if (!document.getElementById("autoPlayToggle").checked) return;

    setTimeout(() => {
        loadVideo();
    }, 15000); // change delay if desired
});

</script>

</body>
</html>
