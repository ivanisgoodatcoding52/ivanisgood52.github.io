<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObscureYT</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #ccc;
    color: #333;
    text-align: center;
}

h1 {
    font-size: 24px;
    font-weight: bold;
    background-color: #eee;
    padding: 10px;
    border-bottom: 2px solid #aaa;
}

iframe {
    width: 640px;
    height: 360px;
    border: 3px solid #999;
    background-color: black;
    margin-top: 20px;
}

button {
    background-color: #d6d6d6;
    border: 1px solid #888;
    padding: 8px 15px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background-color: #c2c2c2;
}

select, input {
    padding: 5px;
    font-size: 14px;
    margin-top: 5px;
}

input[type="text"] {
    width: 300px;
    border: 1px solid #888;
}
</style>
</head>

<body>

<h1>ObscureYT</h1>
<h4>Archive Excavation Engine</h4>

<br>

<input type="text" id="searchInput" placeholder="Enter search terms...">

<br><br>

<label><b>Published Before:</b></label>
<input type="date" id="beforeDate">

<br><br>

<label><b>Max Views:</b></label>
<input type="range" id="viewLimit" min="100" max="50000" step="100" value="5000"
oninput="document.getElementById('viewValue').innerText = this.value">
<span id="viewValue">5000</span>

<br><br>

<label><b>Sort Mode:</b></label>
<select id="sortMode">
    <option value="date">Newest First</option>
    <option value="viewCount">Lowest Views First</option>
    <option value="relevance">Relevance</option>
</select>

<br><br>

<label>
<input type="checkbox" id="randomYearMode">
Random Year Mode
</label>

<br>

<label>
<input type="checkbox" id="autoPlayToggle">
Infinite Autoplay
</label>

<br><br>

<button onclick="loadVideo()">Search / Load Video</button>

<br>

<iframe id="videoFrame" allowfullscreen></iframe>

<script>

/* ================= CONFIG ================= */

const YT_KEYS = [
    "YOUR_YOUTUBE_KEY_1",
    "YOUR_YOUTUBE_KEY_2"
];

let ytKeyIndex = 0;

let playedVideos = new Set();
let youtubePool = [];
let isLoading = false;

/* ================= MAIN ================= */

async function loadVideo() {

    const searchValue = document.getElementById("searchInput").value.trim();
    const query = searchValue !== "" ? searchValue : getRandomWord();

    await loadYouTube(document.getElementById("videoFrame"), query);
}

/* ================= YOUTUBE ================= */

async function loadYouTube(frame, query) {

    if (isLoading) return;
    isLoading = true;

    const beforeDateInput = document.getElementById("beforeDate").value;
    const viewLimit = parseInt(document.getElementById("viewLimit").value);
    const sortMode = document.getElementById("sortMode").value;
    const randomYearMode = document.getElementById("randomYearMode").checked;

    let publishedBefore = "";

    if (randomYearMode) {
        const randomYear = Math.floor(Math.random() * (2022 - 2005)) + 2005;
        const randomDate = new Date(randomYear, 11, 31);
        publishedBefore = randomDate.toISOString();
    } else if (beforeDateInput) {
        publishedBefore = new Date(beforeDateInput).toISOString();
    }

    if (youtubePool.length === 0) {

        let collected = [];
        let pageToken = null;

        for (let i = 0; i < 3; i++) {

            let url =
                `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${encodeURIComponent(query)}&maxResults=50&order=${sortMode}&key=${YT_KEYS[ytKeyIndex]}`;

            if (publishedBefore) {
                url += `&publishedBefore=${publishedBefore}`;
            }

            if (pageToken) {
                url += `&pageToken=${pageToken}`;
            }

            const response = await fetch(url);

            if (response.status === 403) {
                ytKeyIndex = (ytKeyIndex + 1) % YT_KEYS.length;
                isLoading = false;
                return loadYouTube(frame, query);
            }

            if (!response.ok) {
                isLoading = false;
                throw new Error("YouTube search failed.");
            }

            const data = await response.json();

            if (!data.items) break;

            collected.push(...data.items);
            pageToken = data.nextPageToken;

            if (!pageToken) break;
        }

        if (collected.length === 0) {
            isLoading = false;
            alert("No YouTube results found.");
            return;
        }

        const ids = collected.map(v => v.id.videoId).join(",");

        const statsResponse = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${YT_KEYS[ytKeyIndex]}`
        );

        if (!statsResponse.ok) {
            isLoading = false;
            throw new Error("Stats request failed.");
        }

        const statsData = await statsResponse.json();

        const obscure = statsData.items.filter(video =>
            parseInt(video.statistics.viewCount) <= viewLimit
        );

        if (obscure.length === 0) {
            isLoading = false;
            alert("No obscure videos found.");
            return;
        }

        youtubePool = obscure.sort(() => 0.5 - Math.random());
    }

    youtubePool = youtubePool.filter(v => !playedVideos.has(v.id));

    if (youtubePool.length === 0) {
        playedVideos.clear();
        isLoading = false;
        return loadYouTube(frame, query);
    }

    const nextVideo = youtubePool.pop();

    playedVideos.add(nextVideo.id);

    frame.src = `https://www.youtube.com/embed/${nextVideo.id}?autoplay=1`;

    isLoading = false;
}

/* ================= AUTOPLAY ================= */

document.getElementById("videoFrame").addEventListener("load", () => {

    if (!document.getElementById("autoPlayToggle").checked) return;

    setTimeout(() => {
        loadVideo();
    }, 15000); // change delay if desired
});

/* ================= RANDOM WORD ================= */

function getRandomWord() {
    const words = [
        "hello","random","music","gaming","vlog",
        "funny","2008","tutorial","old","test"
    ];
    return words[Math.floor(Math.random() * words.length)];
}

</script>

</body>
</html>
